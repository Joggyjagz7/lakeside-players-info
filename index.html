    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red: #DC2F3F;
            --red-dark: #9e1a26;
            --red-glow: rgba(220,47,63,0.35);
            --black: #080808;
            --surface: #111111;
            --surface2: #181818;
            --border: rgba(255,255,255,0.07);
            --white: #FFFFFF;
            --muted: #666;
            --light: #bbb;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes pulseRed {
            0%,100% { box-shadow: 0 0 0 0 var(--red-glow); }
            50%      { box-shadow: 0 0 20px 6px var(--red-glow); }
        }
        @keyframes countUp {
            from { opacity: 0; transform: scale(0.6); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes scanline {
            from { transform: translateY(-100%); }
            to   { transform: translateY(100vh); }
        }
        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50%      { transform: translateY(-6px); }
        }
        @keyframes glowPulse {
            0%,100% { opacity: 0.4; }
            50%      { opacity: 1; }
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── GRID BG ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(220,47,63,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(220,47,63,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── HEADER ─── */
        header {
            position: relative;
            padding: 3.5rem 2rem 3rem;
            text-align: center;
            overflow: hidden;
            z-index: 1;
        }
        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, #1a0508 0%, #0d0000 50%, #000 100%);
            z-index: -1;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(220,47,63,0.15);
            border: 1px solid rgba(220,47,63,0.4);
            color: var(--red);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 0.4rem 1rem;
            margin-bottom: 1.2rem;
            animation: fadeUp 0.6s ease both;
        }
        .header-badge::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--red);
            border-radius: 50%;
            animation: glowPulse 1.5s ease infinite;
        }

        .club-emblem {
            width: 90px; height: 90px;
            margin: 0 auto 1.2rem;
            position: relative;
            animation: fadeUp 0.6s 0.1s ease both, float 4s ease infinite;
        }
        .club-emblem svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 20px var(--red-glow));
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            letter-spacing: 8px;
            line-height: 0.9;
            background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeUp 0.6s 0.2s ease both;
        }
        header h1 span { color: var(--red); -webkit-text-fill-color: var(--red); }

        .header-sub {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            letter-spacing: 5px;
            color: var(--muted);
            margin-top: 0.7rem;
            text-transform: uppercase;
            animation: fadeUp 0.6s 0.3s ease both;
        }

        /* ─── MAIN CONTAINER ─── */
        .dashboard {
            max-width: 1440px;
            margin: 0 auto;
            padding: 2.5rem 2rem 4rem;
            position: relative;
            z-index: 1;
        }

        /* ─── SECTION LABEL ─── */
        .section-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--red);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(220,47,63,0.4), transparent);
        }

        /* ─── STATS STRIP ─── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-bottom: 3rem;
            animation: fadeUp 0.6s 0.4s ease both;
        }

        .stat-card {
            background: var(--surface);
            padding: 2rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            cursor: default;
            transition: background 0.3s;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--red);
            transform: scaleX(0);
            transition: transform 0.4s ease;
            transform-origin: left;
        }
        .stat-card:hover { background: var(--surface2); }
        .stat-card:hover::before { transform: scaleX(1); }

        .stat-icon {
            font-size: 1.6rem;
            margin-bottom: 0.8rem;
            display: block;
            opacity: 0.7;
        }
        .stat-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            color: var(--red);
            line-height: 1;
            margin-bottom: 0.3rem;
            animation: countUp 0.6s ease both;
        }
        .stat-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ─── CONTROLS ─── */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            animation: fadeUp 0.6s 0.5s ease both;
        }
        .search-wrap {
            flex: 2;
            min-width: 260px;
            position: relative;
        }
        .search-wrap svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }
        .search-wrap input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0;
            color: var(--white);
            font-family: 'Barlow', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.3s, background 0.3s;
        }
        .search-wrap input:focus {
            outline: none;
            border-color: var(--red);
            background: var(--surface2);
        }
        .search-wrap input::placeholder { color: var(--muted); }

        .filter-wrap {
            flex: 1;
            min-width: 180px;
        }
        .filter-wrap select {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--white);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            appearance: none;
            transition: border-color 0.3s;
        }
        .filter-wrap select:focus {
            outline: none;
            border-color: var(--red);
        }

        /* ─── PLAYER GRID ─── */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 1.5rem;
        }

        /* ─── PLAYER CARD ─── */
        .player-card {
            background: var(--surface);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            animation: cardIn 0.5s ease both;
            transition: transform 0.35s cubic-bezier(0.2,0,0,1),
                        border-color 0.35s ease,
                        box-shadow 0.35s ease;
        }
        .player-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(220,47,63,0.06) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .player-card:hover {
            transform: translateY(-6px);
            border-color: rgba(220,47,63,0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(220,47,63,0.15), 0 8px 20px var(--red-glow);
        }
        .player-card:hover::before { opacity: 1; }

        /* Jersey number watermark */
        .card-jersey-bg {
            position: absolute;
            top: -10px; right: -10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 9rem;
            color: rgba(255,255,255,0.025);
            line-height: 1;
            pointer-events: none;
            user-select: none;
            transition: color 0.35s;
        }
        .player-card:hover .card-jersey-bg {
            color: rgba(220,47,63,0.06);
        }

        /* ─── CARD HEADER ─── */
        .card-header {
            display: flex;
            align-items: flex-end;
            gap: 1.2rem;
            padding: 1.5rem 1.5rem 0;
            position: relative;
        }

        /* ─── AVATAR ─── */
        .avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1f0508, #0d0000);
            border: 2px solid rgba(220,47,63,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--red);
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .player-card:hover .avatar {
            border-color: var(--red);
            box-shadow: 0 0 20px var(--red-glow), inset 0 0 20px rgba(220,47,63,0.1);
        }
        /* Shimmer on hover */
        .avatar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
            background-size: 200% 100%;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .player-card:hover .avatar::after {
            opacity: 1;
            animation: shimmer 0.8s ease forwards;
        }

        /* Small position dot on avatar */
        .avatar-pos-dot {
            position: absolute;
            bottom: 2px; right: 2px;
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid var(--surface);
            font-size: 0;
        }

        .card-header-info { flex: 1; padding-bottom: 0.2rem; }
        .player-jersey-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.7rem;
            letter-spacing: 2px;
            line-height: 1;
            color: var(--white);
            transition: color 0.3s;
        }
        .player-card:hover .player-jersey-name { color: var(--red); }

        .player-full-name {
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.5px;
            margin-top: 0.2rem;
        }

        /* ─── POSITION PILL ─── */
        .position-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.7rem;
            border-radius: 0;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }
        .pill-gk   { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .pill-def  { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        .pill-mid  { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .pill-fwd  { background: rgba(220,47,63,0.15);  color: #f87171; border: 1px solid rgba(220,47,63,0.3); }

        /* ─── DIVIDER ─── */
        .card-divider {
            height: 1px;
            margin: 1.2rem 1.5rem;
            background: linear-gradient(90deg, var(--red), transparent);
            transform: scaleX(0.4);
            transform-origin: left;
            transition: transform 0.4s ease;
        }
        .player-card:hover .card-divider { transform: scaleX(1); }

        /* ─── STATS ROW ─── */
        .card-stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            margin: 0 1.5rem;
        }
        .card-stat {
            background: var(--surface2);
            padding: 0.75rem 0.5rem;
            text-align: center;
        }
        .card-stat-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: var(--white);
            line-height: 1;
        }
        .card-stat-lbl {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 0.2rem;
        }

        /* ─── INFO LIST ─── */
        .card-info-list {
            padding: 1rem 1.5rem 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
            gap: 1rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-lbl {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            flex-shrink: 0;
        }
        .info-val {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--light);
            text-align: right;
            word-break: break-word;
        }
        .foot-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: rgba(220,47,63,0.12);
            color: var(--red);
            border: 1px solid rgba(220,47,63,0.25);
        }

        /* ─── CONTACT SECTION ─── */
        .card-contact {
            margin: 1rem 1.5rem 1.5rem;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-left: 2px solid var(--red);
        }
        .contact-row {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }
        .contact-row:last-child { margin-bottom: 0; }
        .contact-row svg { color: var(--red); flex-shrink: 0; }
        .contact-row span { color: var(--light); word-break: break-all; }

        /* ─── SECONDARY POSITION ─── */
        .secondary-pos {
            font-size: 0.72rem;
            color: var(--muted);
            font-style: italic;
            padding: 0 1.5rem 1rem;
        }

        /* ─── EXPAND TOGGLE ─── */
        .card-toggle {
            width: 100%;
            background: none;
            border: none;
            border-top: 1px solid var(--border);
            padding: 0.8rem;
            color: var(--muted);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            transition: color 0.3s, background 0.3s;
        }
        .card-toggle:hover { color: var(--red); background: rgba(220,47,63,0.05); }
        .card-toggle svg { transition: transform 0.3s; }
        .card-toggle.open svg { transform: rotate(180deg); }

        .card-expanded {
            display: none;
            padding: 0 1.5rem 1.5rem;
            animation: fadeUp 0.3s ease;
        }
        .card-expanded.open { display: block; }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center;
            padding: 6rem 2rem;
            color: var(--muted);
            animation: fadeUp 0.5s ease;
        }
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.4;
        }
        .empty-state h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            color: var(--light);
            margin-bottom: 0.5rem;
        }

        /* ─── FOOTER ─── */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
            font-size: 0.78rem;
            letter-spacing: 2px;
            font-family: 'Barlow Condensed', sans-serif;
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2,1fr); }
        }
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2,1fr); }
            .player-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 3rem; }
            .controls { flex-direction: column; }
        }
    </style>

let allPlayers = playerData.players;

function getPositionCategory(pos) {
    const p = pos.toLowerCase();
    if (p.includes('goalkeeper') || p.includes('gk')) return 'gk';
    if (p.includes('back') || p.includes('cb') || p.includes('lb') || p.includes('rb')) return 'def';
    if (p.includes('mid') || p.includes('cdm') || p.includes('cam') || p.includes('cm')) return 'mid';
    return 'fwd';
}

function getPositionPillClass(pos) {
    const cat = getPositionCategory(pos);
    return { gk: 'pill-gk', def: 'pill-def', mid: 'pill-mid', fwd: 'pill-fwd' }[cat];
}

function getPositionDotColor(pos) {
    const cat = getPositionCategory(pos);
    return { gk: '#a78bfa', def: '#60a5fa', mid: '#34d399', fwd: '#f87171' }[cat];
}

function getInitials(first, last) {
    return ((first.trim()[0] || '') + (last.trim()[0] || '')).toUpperCase();
}

function animateCount(el, target) {
    let start = 0;
    const duration = 800;
    const step = (timestamp) => {
        if (!start) start = timestamp;
        const progress = Math.min((timestamp - start) / duration, 1);
        el.textContent = Math.floor(progress * target);
        if (progress < 1) requestAnimationFrame(step);
        else el.textContent = target;
    };
    requestAnimationFrame(step);
}

function initDashboard() {
    animateCount(document.getElementById('totalPlayers'), playerData.stats.totalPlayers);
    animateCount(document.getElementById('defenders'),    playerData.stats.positions.Defender);
    animateCount(document.getElementById('midfielders'),  playerData.stats.positions.Midfielder);
    animateCount(document.getElementById('forwards'),     playerData.stats.positions.Forward);
    displayPlayers(allPlayers);
}

function displayPlayers(players) {
    const grid = document.getElementById('playerGrid');
    const empty = document.getElementById('emptyState');

    if (!players.length) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        return;
    }
    grid.style.display = 'grid';
    empty.style.display = 'none';

    grid.innerHTML = players.map((p, i) => {
        const initials   = getInitials(p.firstName, p.lastName);
        const pillClass  = getPositionPillClass(p.position);
        const dotColor   = getPositionDotColor(p.position);
        const jerseyDisp = String(p.jerseyName).trim() || '—';
        const delay      = Math.min(i * 0.06, 1);

        return `
        <div class="player-card" style="animation-delay:${delay}s">
            <div class="card-jersey-bg">${p.id}</div>

            <div class="card-header">
                <div class="avatar-wrap">
                    <div class="avatar">${initials}
                        <div class="avatar-pos-dot" style="background:${dotColor}"></div>
                    </div>
                </div>
                <div class="card-header-info">
                    <div class="player-jersey-name">${jerseyDisp}</div>
                    <div class="player-full-name">${p.firstName.trim()} ${p.lastName.trim()}</div>
                    <div class="position-pill ${pillClass}">${p.position}</div>
                </div>
            </div>

            <div class="card-divider"></div>

            <div class="card-stats-row">
                <div class="card-stat">
                    <div class="card-stat-val">${p.age > 0 && p.age < 100 ? p.age : '—'}</div>
                    <div class="card-stat-lbl">Age</div>
                </div>
                <div class="card-stat">
                    <div class="card-stat-val">${p.height || '—'}</div>
                    <div class="card-stat-lbl">Height</div>
                </div>
                <div class="card-stat">
                    <div class="card-stat-val">${(p.weight && p.weight !== '—') ? p.weight + 'kg' : '—'}</div>
                    <div class="card-stat-lbl">Weight</div>
                </div>
            </div>

            <div class="card-info-list">
                <div class="info-row">
                    <span class="info-lbl">Preferred Foot</span>
                    <span class="info-val"><span class="foot-badge">${p.foot}</span></span>
                </div>
                <div class="info-row">
                    <span class="info-lbl">Occupation</span>
                    <span class="info-val">${p.occupation.trim()}</span>
                </div>
                <div class="info-row">
                    <span class="info-lbl">Service Unit</span>
                    <span class="info-val">${p.serviceUnit.trim()}</span>
                </div>
            </div>

            ${p.secondaryPosition ? `<div class="secondary-pos">Alt: ${p.secondaryPosition}</div>` : ''}

            <button class="card-toggle" onclick="toggleExpand(this)">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
                Contact Info
            </button>

            <div class="card-expanded">
                <div class="card-contact">
                    <div class="contact-row">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18 2 2 0 012.04 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z"/></svg>
                        <span>+234 ${p.phone}</span>
                    </div>
                    <div class="contact-row">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <span>${p.email.trim()}</span>
                    </div>
                    <div class="contact-row">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        <span>${p.emergencyContact.trim()} — ${p.emergencyPhone.trim()}</span>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

function toggleExpand(btn) {
    btn.classList.toggle('open');
    const expanded = btn.nextElementSibling;
    expanded.classList.toggle('open');
}

function filterPlayers() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const pos    = document.getElementById('positionFilter').value;

    let filtered = allPlayers.filter(p => {
        const posMatch = pos === 'all' || (() => {
            const cat = getPositionCategory(p.position);
            return (pos === 'defender' && cat === 'def') ||
                   (pos === 'midfielder' && cat === 'mid') ||
                   (pos === 'forward' && cat === 'fwd');
        })();

        const searchMatch = !search ||
            p.firstName.toLowerCase().includes(search) ||
            p.lastName.toLowerCase().includes(search) ||
            String(p.jerseyName).toLowerCase().includes(search) ||
            p.position.toLowerCase().includes(search) ||
            p.occupation.toLowerCase().includes(search);

        return posMatch && searchMatch;
    });

    displayPlayers(filtered);
}

document.addEventListener('DOMContentLoaded', initDashboard);
</script>
